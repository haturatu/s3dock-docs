{{ define "main" }}
<section class="hero">
  <div class="container hero-grid">
    <div>
      <p class="eyebrow">{{ .Params.eyebrow }}</p>
      <h1>{{ .Title }}</h1>
      <p class="lead">{{ .Params.lead }}</p>
      <div class="actions">
        <a class="button primary" href="{{ "privacy/" | relLangURL }}">{{ .Params.primaryAction }}</a>
      </div>
    </div>
    <div class="device" aria-hidden="true">
      <div class="screen">
        <div class="screen-top">
          <span>S3Dock</span>
          <span>Grid</span>
        </div>
        <div class="file-grid">
          <div class="tile media"><span>Photos</span><strong>24</strong></div>
          <div class="tile"><span>Music</span><strong>128</strong></div>
          <div class="tile media"><span>Videos</span><strong>12</strong></div>
          <div class="tile"><span>Offline</span><strong>Ready</strong></div>
        </div>
      </div>
    </div>
  </div>
</section>
<section class="section">
  <div class="container">
    {{ .Content }}
  </div>
</section>
{{ end }}
