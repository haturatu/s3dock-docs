baseURL = "https://s3dock.soulminingrig.com/"
title = "S3Dock"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "S3Dock is an Android client for object storage with file browsing, media playback, offline access, and local cache controls."
  appName = "S3Dock"
  displayUpdatedDate = false

  [params.navbar]
    displayTitle = true
    displayLogo = true

    [params.navbar.logo]
      path = "app-icon.png"
      link = "/"
      width = 32
      height = 32

  [params.theme]
    default = "system"
    displayToggle = true

  [params.editURL]
    enable = false

  [params.page]
    width = "wide"
    displayPagination = false

  [params.footer]
    displayPoweredBy = false
    displayCopyright = false

[markup.goldmark.renderer]
  unsafe = true

[languages]
  [languages.en]
    label = "English"
    weight = 1
    title = "S3Dock"
    contentDir = "content/en"
  [languages.ja]
    label = "日本語"
    weight = 2
    title = "S3Dock"
    contentDir = "content/ja"

[[languages.en.menu.main]]
  name = "Home"
  pageRef = "/"
  weight = 1

[[languages.en.menu.main]]
  name = "Privacy"
  pageRef = "/privacy"
  weight = 2

[[languages.en.menu.main]]
  name = "Search"
  weight = 3
  [languages.en.menu.main.params]
    type = "search"

[[languages.en.menu.main]]
  name = "Theme"
  weight = 4
  [languages.en.menu.main.params]
    type = "theme-toggle"

[[languages.en.menu.main]]
  name = "Language"
  weight = 5
  [languages.en.menu.main.params]
    type = "language-switch"

[[languages.ja.menu.main]]
  name = "ホーム"
  pageRef = "/"
  weight = 1

[[languages.ja.menu.main]]
  name = "プライバシー"
  pageRef = "/privacy"
  weight = 2

[[languages.ja.menu.main]]
  name = "検索"
  weight = 3
  [languages.ja.menu.main.params]
    type = "search"

[[languages.ja.menu.main]]
  name = "テーマ"
  weight = 4
  [languages.ja.menu.main.params]
    type = "theme-toggle"

[[languages.ja.menu.main]]
  name = "言語"
  weight = 5
  [languages.ja.menu.main.params]
    type = "language-switch"
